apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tenant-c
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: saasify/tenant-worker:v1
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          value: redis
        - name: TENANT
          value: tenant-c
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15