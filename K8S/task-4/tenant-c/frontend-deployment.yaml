apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tenant-c
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: saasify/tenant-ui:v1
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_URL
          value: http://backend:8080
        - name: TENANT
          value: tenant-c
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15  