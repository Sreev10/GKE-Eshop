apiVersion: batch/v1
kind: Job

metadata:
  name: h2-postgres-migration
  namespace: finbank-legacy

spec:
  backoffLimit: 3

  template:

    metadata:
      labels:
        app: db-migration

    spec:

      restartPolicy: Never

      containers:

      - name: migration

        image: postgres:16

        command:
        - /bin/sh
        - -c
        - |
          echo "Starting migration..."
          sleep 10
          echo "Exporting data from H2..."
          sleep 5
          echo "Importing data into PostgreSQL..."
          sleep 5
          echo "Migration completed successfully."

        env:

        - name: DB_HOST
          value: postgres

        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"
    