apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-gateway
  namespace: finbank-new

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-gateway

  template:

    metadata:
      labels:
        app: nginx-gateway

    spec:

      containers:

      - name: nginx

        image: nginx:latest

        ports:
        - containerPort: 80

        volumeMounts:

        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"

      volumes:

      - name: nginx-config

        configMap:
          name: nginx-config